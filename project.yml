# XcodeGen spec — .xcodeproj is generated, never committed (D1).
# See docs/phase-0-spec.md §"project.yml essentials".
name: LotusScribe
options:
  deploymentTarget:
    macOS: "14.0"

targets:
  LotusScribe:
    type: application
    platform: macOS
    sources:
      - Sources/LotusScribe
    info:
      path: Sources/LotusScribe/Info.plist  # generated by xcodegen; gitignored
      properties:
        LSUIElement: true  # menu-bar-only invariant — no Dock icon, no Cmd-Tab entry
        NSMicrophoneUsageDescription: LotusScribe records audio while the dictation hotkey is held, to transcribe your speech.  # 1B — mic TCC prompt text
        # Phase 9: without this string tccd REFUSES to prompt for Input
        # Monitoring (authReason=5 "service policy", tccd-log-verified) — the
        # Allow… request silently no-ops and the app never appears in the pane.
        NSInputMonitoringUsageDescription: LotusScribe watches for your dictation hotkey so hold-to-talk works in any app. It never logs or stores your keystrokes.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garisonlotus.LotusScribe
        # D12/Q1: real Apple Development signing so TCC grants persist.
        DEVELOPMENT_TEAM: 5RC66Q82V9
        CODE_SIGN_STYLE: Automatic

  LotusScribeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/LotusScribeTests
    dependencies:
      - target: LotusScribe  # hosted tests — xcodegen sets TEST_HOST
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES  # test bundle needs an Info.plist to code sign
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual

schemes:
  LotusScribe:
    build:
      targets:
        LotusScribe: all
    test:
      targets:
        - LotusScribeTests
